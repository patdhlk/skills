# Rust CI gate for the pds workspace (cli/): fmt, clippy (-D warnings), and
# tests must all pass. Runs only when cli/** or this file changes.
name: rust

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/rust.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin is honoured by reading cli/rust-toolchain.toml directly: the
      # `toolchain-file` input passes the path to dtolnay/rust-toolchain,
      # which parses the [toolchain] channel value (1.96.0) and installs
      # exactly that release with rustfmt + clippy components included.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain-file: cli/rust-toolchain.toml
          components: rustfmt, clippy

      # Cache ~/.cargo registry + git db + cli/target in one step.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        working-directory: cli
        run: cargo test --all
