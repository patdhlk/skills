# Spec CI (ADR_0017: the gate builds needs, not html).
#
#   gate  — the required gate. `pds check` runs the builder's strict
#           diagnostics (schema violations, broken links, duplicate IDs fail
#           the build — ADR_0007) and produces a fresh needs.json.
#   docs  — the demoted html build. Rendering-only warnings surface here,
#           non-gating (ADR_0017 consequences). This is the docs-publishing
#           step, NOT the gate; it runs in parallel with `gate`.
#
# Runs on every push to main and on PRs.
name: spec

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync toolchain
        run: uv sync

      # The repo's builder is ubc (ubproject.toml -> [tool.patdhlk-skills]).
      # useblocks' official action installs + caches ubc and puts it on PATH;
      # the `make strict` step below then spawns it through `pds`. No license
      # inputs: this is a public repo, so ubc auto-detects the free open-source
      # license. (The action is install-only here — it does not itself harden
      # that license probe; a transient probe failure is cleared by a re-run.)
      - name: Install ubc
        uses: useblocks/ubc-action@0422e463faa37e16f39d3d6eb21b15f9e3e060f9 # 0.1
        with:
          version: 0.29.3
          # Free open-source license, supplied via repo secrets so no identity
          # lives in this file. Until the secrets are set they resolve empty
          # and the action installs ubc license-less (it then auto-detects the
          # public repo via an anonymous probe — occasionally rate-limited on
          # shared runner IPs; re-run if the gate flakes).
          license-user: ${{ secrets.UBC_LICENSE_USER }}
          license-key: ${{ secrets.UBC_LICENSE_KEY }}

      # `make strict` runs `pds check`; with no `pds` on PATH it cargo-runs the
      # in-tree crate (cli/). The pin lives in cli/rust-toolchain.toml; rustup
      # auto-installs that channel on first use from cli/ (same pattern as
      # rust.yml).
      - name: Install Rust toolchain from rust-toolchain.toml
        working-directory: cli
        run: rustup show active-toolchain

      # Cache ~/.cargo registry + git db + cli/target so the cargo-run of pds
      # stays fast.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Strict gate (pds check)
        run: make strict

  docs:
    # Docs-publishing step, NOT the gate (ADR_0017). No -W: rendering-only
    # warnings surface here without blocking. Whether this is a required check
    # is configured repo-side, not in this YAML.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync toolchain
        run: uv sync

      - name: Build HTML docs
        run: make html
