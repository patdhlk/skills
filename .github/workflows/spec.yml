# Spec CI (ADR_0017: the gate builds needs, not html).
#
#   gate  — the required gate. `pds check` runs the builder's strict
#           diagnostics (schema violations, broken links, duplicate IDs fail
#           the build — ADR_0007) and produces a fresh needs.json.
#   docs  — the demoted html build. Rendering-only warnings surface here,
#           non-gating (ADR_0017 consequences). This is the docs-publishing
#           step, NOT the gate; it runs in parallel with `gate`.
#
# Runs on every push to main and on PRs.
name: spec

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync toolchain
        run: uv sync

      # The repo's builder is ubc (ubproject.toml -> [tool.patdhlk-skills]).
      # /usr/local/bin is writable via sudo on ubuntu runners.
      - name: Install ubc
        run: |
          sudo curl -fsSL \
            "https://download.useblocks.com/ubc/0.29.3/ubc-linux-$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')-0.29.3" \
            -o /usr/local/bin/ubc
          sudo chmod +x /usr/local/bin/ubc

      # `make strict` runs `pds check`; with no `pds` on PATH it cargo-runs the
      # in-tree crate (cli/). The pin lives in cli/rust-toolchain.toml; rustup
      # auto-installs that channel on first use from cli/ (same pattern as
      # rust.yml).
      - name: Install Rust toolchain from rust-toolchain.toml
        working-directory: cli
        run: rustup show active-toolchain

      # Cache ~/.cargo registry + git db + cli/target so the cargo-run of pds
      # stays fast.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Strict gate (pds check)
        run: make strict

  docs:
    # Docs-publishing step, NOT the gate (ADR_0017). No -W: rendering-only
    # warnings surface here without blocking. Whether this is a required check
    # is configured repo-side, not in this YAML.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync toolchain
        run: uv sync

      - name: Build HTML docs
        run: make html
